name: Update Plugins

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Update plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx plugin-update

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'chore: daily plugin upstream sync'
          title: 'chore: daily plugin upstream sync'
          body: |
            Automated daily refresh of upstream skills, agents, and commands via `npx plugin-update`.
          branch: chore/daily-plugin-update
          delete-branch: true
