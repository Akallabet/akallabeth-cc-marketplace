name: Update Plugins

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Update plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx plugin-update

      - name: Upload prompt injection report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: prompt-injection-report
          path: reports/prompt-injection.json
          if-no-files-found: warn

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: daily plugin upstream sync"
          title: "chore: daily plugin upstream sync"
          body: |
            Automated daily refresh of upstream skills, agents, and commands via `npx plugin-update`.
          branch: chore/daily-plugin-update
          delete-branch: true
